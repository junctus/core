[package]
name = "neo-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "neo desktop daemon and CLI (macOS + Linux)."

[[bin]]
name = "neo"
path = "src/main.rs"

[features]
default = []
# Bridge a real TUN device in `neo run --tun` (needs root to run).
tun = ["neo-node/tun", "neo-dataplane/tun"]

[dependencies]
neo-core.workspace = true
neo-node.workspace = true
neo-mix.workspace = true
neo-dataplane.workspace = true
clap.workspace = true
anyhow.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
hex.workspace = true
