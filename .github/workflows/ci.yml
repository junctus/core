name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (workspace, all targets, default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (neo-discovery with libp2p backend)
        run: cargo clippy -p neo-discovery --all-targets --features libp2p -- -D warnings

      # The experimental `mpc_tls` two-party TLS suite (live TLS 1.3 interop against a
      # rustls server + networked KOS/OT over real sockets) runs into minutes and is not
      # yet a gating capability, so it is skipped in the standard run to keep CI fast.
      # The suite still COMPILES here (so build breaks are caught) and its non-mpc_tls
      # siblings (DKG / VSS / threshold / committee) still run; run the 2PC-TLS suite on
      # demand with `cargo test -p neo-mpc mpc_tls`.
      - name: Test (workspace, default features; experimental mpc_tls suite skipped)
        run: cargo test --workspace -- --skip mpc_tls

      - name: Test (neo-discovery with libp2p backend)
        run: cargo test -p neo-discovery --features libp2p

      - name: Build release CLI
        run: cargo build --release -p neo-cli

      - name: Compile-check the TUN data plane
        run: cargo build -p neo-cli --features tun

  audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # The libp2p 0.56 umbrella crate locks its optional `dns` backend even though
      # neo never enables or reaches it (`cargo tree ... -i hickory-proto` is empty).
      # Upstream libp2p-dns still pins vulnerable hickory 0.25 and RUSTSEC-2026-0118
      # has no fixed release. Keep these narrowly-scoped exceptions only until an
      # upstream release moves to hickory >=0.26.1; every reachable vulnerability
      # remains a hard failure and all advisory warnings remain visible.
      - name: Audit dependencies
        run: >-
          cargo audit
          --ignore RUSTSEC-2026-0118
          --ignore RUSTSEC-2026-0119
