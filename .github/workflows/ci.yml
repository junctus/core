name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (workspace, all targets, default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (neo-discovery with libp2p backend)
        run: cargo clippy -p neo-discovery --all-targets --features libp2p -- -D warnings

      - name: Test (workspace, default features)
        run: cargo test --workspace

      - name: Test (neo-discovery with libp2p backend)
        run: cargo test -p neo-discovery --features libp2p

      - name: Build release CLI
        run: cargo build --release -p neo-cli

      - name: Compile-check the TUN data plane
        run: cargo build -p neo-cli --features tun

  audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Surface RustSec advisories against the committed lockfile. The known
      # `sharks 0.5.0` advisory (RUSTSEC-2024-0398) is ignored for now — its path
      # is test-only and the secrecy caveat is documented (see neo-mpc) pending a
      # migration to a vetted GF(256) Shamir. Remove the ignore once migrated.
      - name: Audit dependencies
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0398
