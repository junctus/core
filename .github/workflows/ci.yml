name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (workspace, all targets, default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (neo-discovery with libp2p backend)
        run: cargo clippy -p neo-discovery --all-targets --features libp2p -- -D warnings

      # The experimental `mpc_tls` two-party TLS suite (live TLS 1.3 interop against a
      # rustls server + networked KOS/OT over real sockets) runs into minutes and is not
      # yet a gating capability, so it is skipped in the standard run to keep CI fast.
      # The suite still COMPILES here (so build breaks are caught) and its non-mpc_tls
      # siblings (DKG / VSS / threshold / committee) still run; run the 2PC-TLS suite on
      # demand with `cargo test -p neo-mpc mpc_tls`.
      - name: Test (workspace, default features; experimental mpc_tls suite skipped)
        run: cargo test --workspace -- --skip mpc_tls

      - name: Test (neo-discovery with libp2p backend)
        run: cargo test -p neo-discovery --features libp2p

      - name: Build release CLI
        run: cargo build --release -p neo-cli

      - name: Compile-check the TUN data plane
        run: cargo build -p neo-cli --features tun

  audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Surface RustSec advisories against the committed lockfile. This gate FAILS on
      # any vulnerability, so a new one on any crate breaks CI; lower-severity warnings
      # (unmaintained / unsound / yanked transitive crates) are printed but do not gate,
      # because they are all transitive and can't be resolved without a major upstream
      # bump — a permanently-red gate just gets ignored. The `--ignore`d IDs below are
      # the current vulnerabilities that are NOT on a security-critical neo path; each
      # is tracked, revisit on the next `libp2p` / `reqwest` bump. (The former
      # `sharks`/RUSTSEC-2024-0398 ignore was removed — that dep is gone, migrated to
      # the bias-free `blahaj` fork.)
      #
      #   rustls-webpki 0.101.7 (RUSTSEC-2026-0098/0099/0104): pulled by `libp2p-tls`
      #     for the discovery substrate's *self-signed* peer certs — the name-constraint
      #     and CRL-parse bugs do not apply to that usage. neo's security-critical
      #     destination cert-chain verification (committee 2PC-TLS) uses the PATCHED
      #     `rustls-webpki 0.103.13`, which is unaffected.
      #   ring 0.16.20 (RUSTSEC-2025-0009): AES panic on overflow-checked (debug) builds
      #     only; via `rcgen 0.11` under `libp2p-tls`, used solely to mint the libp2p
      #     self-signed cert.
      #   hickory-proto 0.24 (RUSTSEC-2026-0119): DNS name-compression CPU blowup,
      #     bounded by request-size caps; not on the onion data path.
      - name: Audit dependencies
        run: >-
          cargo audit
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2026-0104
          --ignore RUSTSEC-2025-0009
          --ignore RUSTSEC-2026-0119
